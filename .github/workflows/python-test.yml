name: Test
on:
  # pull-request events are not triggered when a PR is merged
  # push events are not triggered when a PR created from a fork repository
  # So we need both to run tests on every PR and after merging
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  actionlint:
    uses: kitsuyui/gh-actions-workflows/.github/workflows/actionlint.yml@9108d679c02a52824376afcf071715fdaaa2a4e4 # main
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "${{ matrix.python }}"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv python pin ${{ matrix.python }}
          uv sync

      - name: Lint
        run: uv run poe check

      - name: Type check
        run: uv run poe typecheck

      - name: Check Python version
        run: |
          actual_version=$(uv run python --version)
          expected_version="Python ${{ matrix.python }}"
          if [[ "$actual_version" != *"$expected_version"* ]]; then
            echo "Expected $expected_version, but got $actual_version"
            exit 1
          fi

      - name: Test
        run: uv run poe test

      - name: Coverage
        run: uv run poe coverage-xml
